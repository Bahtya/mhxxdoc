    .text-neon { text-shadow: 0 0 5px #7C3AED, 0 0 10px #7C3AED, 0 0 20px #7C3AED; }

    ::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 4px; }

    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(124, 58, 237, 0.3); }

    .sidebar-link.active { border-left: 2px solid #7C3AED; background: rgba(124, 58, 237, 0.2); }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: rgba(124, 58, 237, 0.2); color: #A78BFA; font-family: 'Russo One', sans-serif; text-align: left; padding: 12px 16px; border-bottom: 1px solid rgba(124, 58, 237, 0.3); }
    .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .data-table tr:hover td { background: rgba(124, 58, 237, 0.1); }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #9CA3AF; }
    .breadcrumb a { color: #A78BFA; transition: color 0.2s; }
    .breadcrumb a:hover { color: #7C3AED; }
    .tag { display: inline-block; padding: 2px 8px; font-size: 12px; border-radius: 4px; }
    .tag-fire { background: rgba(239, 68, 68, 0.2); color: #F87171; }
    .tag-water { background: rgba(59, 130, 246, 0.2); color: #60A5FA; }
    .tag-thunder { background: rgba(234, 179, 8, 0.2); color: #FACC15; }
    .tag-ice { background: rgba(34, 211, 238, 0.2); color: #22D3EE; }
    .tag-dragon { background: rgba(124, 58, 237, 0.2); color: #A78BFA; }
    .tag-new { background: rgba(168, 85, 247, 0.2); color: #C084FC; }
    .tag-g { background: rgba(236, 72, 153, 0.2); color: #F472B6; }
